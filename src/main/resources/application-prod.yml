spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      password: ${SPRING_DATA_REDIS_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    enabled: true

security:
  jwt:
    secret: ${JWT_SECRET}
    issuer: valora-api

brapi:
  token: ${BRAPI_TOKEN:}

provents:
  sync:
    cron: ${PROVENTS_SYNC_CRON:0 15 8 * * *}
    asset-lookback-days: ${PROVENTS_SYNC_ASSET_LOOKBACK_DAYS:365}
    jcp-rate-is-gross: ${PROVENTS_SYNC_JCP_RATE_IS_GROSS:true}
