spring:
  datasource:
    url: jdbc:h2:mem:valora;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    enabled: true

security:
  jwt:
    secret: test-secret-key
    issuer: valora-api-test

brapi:
  token: ${BRAPI_TOKEN:}
