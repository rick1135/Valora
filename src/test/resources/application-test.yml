spring:
  task:
    scheduling:
      enabled: false
  main:
    allow-bean-definition-overriding: true
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    enabled: true

security:
  jwt:
    secret: test-secret-key
    issuer: valora-api-test

brapi:
  token: ${BRAPI_TOKEN:}

provents:
  sync:
    asset-lookback-days: 365
    jcp-rate-is-gross: true
